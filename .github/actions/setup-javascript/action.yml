name: Set up Javascript
description: Installs Bun.js and dependencies defined in package.json
runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version-file: "frontend/.nvmrc"
    - name: Set up Bun
      uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
      with:
        bun-version: latest
    - name: Install bun dependencies
      shell: bash
      working-directory: ./frontend
      run: |
        set -euo pipefail

        max_attempts=3
        attempt=1

        while [ "$attempt" -le "$max_attempts" ]; do
          echo "bun install attempt ${attempt}/${max_attempts}"
          if bun install --frozen-lockfile; then
            break
          fi

          if [ "$attempt" -eq "$max_attempts" ]; then
            echo "bun install failed after ${max_attempts} attempts"
            exit 1
          fi

          attempt=$((attempt + 1))
          echo "Retrying bun install in 5s..."
          sleep 5
        done

        bunx cypress install
        bunx cypress verify
