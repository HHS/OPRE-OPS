repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '^frontend/src/uswds/.*(\.svg|\.map)$'
      - id: check-json
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        name: isort (ops_api)
        args: ["--settings-file", "backend/ops_api/pyproject.toml", "--filter-files"]
        files: ^backend/ops_api/
      - id: isort
        name: isort (data_tools)
        args: ["--settings-file", "backend/data_tools/pyproject.toml", "--filter-files"]
        files: ^backend/data_tools/
  - repo: local
    hooks:
      - id: nox-lint
        name: nox-lint
        entry: bash -c 'cd ./backend/ops_api && pipenv run nox -s lint'
        language: system
        types:
          - python
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: bash -c 'cd ./frontend/ && bun lint'
        language: system
        types_or:
          - javascript
          - jsx
          - css
          - html
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: bash -c 'cd ./frontend/ && bunx prettier --check --ignore-unknown'
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|css|scss|html|md)$
        pass_filenames: true
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        entry: bash
        args:
          - -c
          - |
            GIT_COMMON_DIR=$(git rev-parse --git-common-dir)
            GIT_DIR=$(git rev-parse --git-dir)

            if command -v podman >/dev/null 2>&1; then
              CONTAINER_BIN=podman
            elif command -v docker >/dev/null 2>&1; then
              CONTAINER_BIN=docker
            else
              echo "Neither docker nor podman found. Please install one of them."
              exit 1
            fi

            "$CONTAINER_BIN" run --rm \
              -v "$(pwd):/workdir" \
              -v "$GIT_COMMON_DIR:/git-common:ro" \
              -v "$GIT_DIR:/git-worktree:ro" \
              --entrypoint sh \
              -i trufflesecurity/trufflehog:latest \
              -c 'cp -R /workdir /scan && rm -f /scan/.git && mkdir -p /scan/.git && cp -R /git-worktree/. /scan/.git && printf "%s\n" /git-common > /scan/.git/commondir && trufflehog git file:///scan --since-commit HEAD --only-verified --fail'
        language: system
        stages: ["pre-commit", "pre-push"]
        pass_filenames: false
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
        language_version: 22.8.0
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.59.6
    hooks:
      - id: renovate-config-validator
